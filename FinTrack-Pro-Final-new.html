<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinTrack Pro">
<meta name="theme-color" content="#16A34A">
<title>FinTrack Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:#F5F5F0;color:#111;max-width:480px;margin:0 auto;display:flex;flex-direction:column;height:100%}
::-webkit-scrollbar{display:none}
input,select,button,textarea{font-family:inherit}
#app{display:flex;flex-direction:column;height:100%}

/* Header */
.hdr{padding:calc(13px + env(safe-area-inset-top,0px)) 16px 12px;background:#fff;border-bottom:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:90}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.main{padding:15px 14px 22px}
.bnav{background:#fff;border-top:1px solid #EBEBEB;display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);z-index:90}

/* Logo */
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#16A34A,#0D9488);color:#fff;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center}
.logo-title{font-size:16px;font-weight:700}
.logo-sub{font-size:10px;color:#9CA3AF}

/* Nav — 6 tabs */
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 0 5px;background:none;border:none;cursor:pointer;color:#B0B0B0;font-size:8.5px;font-weight:500;min-width:0}
.ni.on{color:#16A34A;font-weight:700}
.ni-ic{font-size:19px;line-height:1}

/* Cards */
.card{background:#fff;border-radius:15px;padding:13px 14px;border:1px solid #EBEBEB;margin-bottom:10px}
.cg{background:#F0FDF4;border-color:#BBF7D0}
.cr{background:#FEF2F2;border-color:#FECACA}
.cb{background:#EFF6FF;border-color:#BFDBFE}
.cy{background:#FFFBEB;border-color:#FDE68A}
.ct{background:#F0FDFA;border-color:#99F6E4}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}

/* Typography */
.lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#9CA3AF;margin-bottom:3px}
.lg{color:#16A34A}.lr{color:#DC2626}.lb{color:#2563EB}.ly{color:#D97706}.lt{color:#0D9488}
.n1{font-size:29px;font-weight:800;letter-spacing:-.5px}
.n2{font-size:19px;font-weight:700}
.n3{font-size:14px;font-weight:700}
.nt{font-size:11px;color:#9CA3AF;margin-top:2px}
.stitle{font-size:17px;font-weight:700;margin-bottom:12px}

/* Progress */
.bar{height:8px;background:#EBEBEB;border-radius:99px;overflow:hidden;margin:5px 0}
.barf{height:100%;border-radius:99px;transition:width .5s ease}

/* Pills */
.pills{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.pill{padding:6px 12px;border-radius:99px;border:none;cursor:pointer;font-size:12px;white-space:nowrap;font-weight:500;background:#F0F0EC;color:#6B7280}
.pill.on{background:#16A34A;color:#fff;font-weight:700}
.pill.ron{background:#DC2626;color:#fff;font-weight:700}
.pill.ton{background:#0D9488;color:#fff;font-weight:700}

/* Items */
.item{background:#fff;border-radius:13px;padding:12px 13px;border:1px solid #EBEBEB;margin-bottom:8px}
.ir{display:flex;align-items:center;gap:11px}
.ibox{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.inm{font-weight:600;font-size:14px}
.imt{font-size:11px;color:#9CA3AF;margin-top:2px}
.ar{display:flex;gap:6px;margin-top:9px}

/* Buttons */
.btnp{width:100%;padding:13px;border-radius:13px;border:none;background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.btnt{background:#16A34A;color:#fff;border:none;border-radius:9px;padding:7px 14px;font-weight:600;cursor:pointer;font-size:13px}
.btntb{background:#2563EB;color:#fff;border:none;border-radius:9px;padding:7px 14px;font-weight:600;cursor:pointer;font-size:13px}
.btno{flex:1;padding:8px;border-radius:9px;border:1px solid #E5E7EB;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#6B7280}
.btno.on{border-color:#BBF7D0;background:#F0FDF4;color:#16A34A}
.btne{padding:7px 10px;border-radius:8px;border:1px solid #BFDBFE;background:#EFF6FF;color:#2563EB;cursor:pointer;font-size:12px;font-weight:600}
.btnd{padding:7px 10px;border-radius:8px;border:1px solid #FECACA;background:#FEF2F2;color:#DC2626;cursor:pointer;font-size:12px;font-weight:600}

/* Budget */
.bi{background:#fff;border-radius:13px;padding:12px 13px;border:1px solid #EBEBEB;margin-bottom:9px}
.br2{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.bcat{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px}
.edbtn{background:none;border:1px solid #E5E7EB;border-radius:7px;padding:4px 9px;cursor:pointer;font-size:11px;color:#6B7280}
.inli{width:110px;padding:5px 8px;border:1.5px solid #16A34A;border-radius:8px;font-size:14px;outline:none}
.okb{background:#16A34A;color:#fff;border:none;border-radius:7px;padding:5px 9px;cursor:pointer}
.cxb{background:#F3F4F6;border:none;border-radius:7px;padding:5px 9px;cursor:pointer}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.sh{background:#fff;width:100%;max-width:480px;margin:0 auto;border-radius:22px 22px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom,0px));max-height:90vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mt{font-size:17px;font-weight:700}
.xb{background:#F3F4F6;border:none;border-radius:9px;width:32px;height:32px;cursor:pointer;font-size:15px}
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.fi,.fs{width:100%;padding:11px 12px;border:1.5px solid #E5E7EB;border-radius:11px;font-size:15px;background:#FAFAFA;outline:none;-webkit-appearance:none}
.fi:focus,.fs:focus{border-color:#16A34A;background:#F0FDF4}
.st2{display:flex;gap:8px;margin-bottom:14px}
.st{flex:1;padding:10px;border-radius:11px;border:none;cursor:pointer;font-weight:600;font-size:13px}
.st.on{background:#111;color:#fff}
.st:not(.on){background:#F3F4F6;color:#6B7280}

/* Badge */
.bdg{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;margin-left:4px;vertical-align:middle}
.bdgg{background:#F0FDF4;color:#16A34A}
.bdgr{background:#FEF2F2;color:#DC2626}
.bdgy{background:#F3F4F6;color:#9CA3AF}
.bdgb{background:#EFF6FF;color:#2563EB}
.bdgt{background:#F0FDFA;color:#0D9488}

/* FAB */
.fab{position:absolute;bottom:calc(64px + env(safe-area-inset-bottom,0px));right:17px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#16A34A,#15803D);color:#fff;border:none;font-size:27px;cursor:pointer;box-shadow:0 4px 18px rgba(22,163,74,.5);display:none;align-items:center;justify-content:center;z-index:110}

/* Toast */
#toast{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Donut */
.dw{display:flex;align-items:center;gap:13px;margin:9px 0}
.dn{width:88px;height:88px;border-radius:50%;flex-shrink:0}
.leg{flex:1;display:flex;flex-direction:column;gap:5px}
.li{display:flex;align-items:center;gap:7px;font-size:11px}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Month select */
.ms{width:100%;padding:9px 12px;border:1.5px solid #E5E7EB;border-radius:11px;font-size:14px;background:#fff;outline:none;-webkit-appearance:none;margin-bottom:13px;font-weight:600;cursor:pointer}
.ms:focus{border-color:#16A34A}

/* Empty */
.emp{text-align:center;padding:36px 20px;color:#9CA3AF}
.emp i{font-size:34px;display:block;margin-bottom:9px}

/* Transaction row */
.trow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #F5F5F5}
.trow:last-child{border:none}

/* Stat box */
.sbox{background:#F5F5F0;border-radius:9px;padding:8px;text-align:center}
.sbox .sl{font-size:9px;color:#9CA3AF;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.sbox .sv{font-weight:800;font-size:12px;margin-top:2px}

/* Net row */
.nr{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F5F5F5;font-size:13px}
.nr:last-child{border:none}

/* Wallet balance card */
.walcard{background:linear-gradient(135deg,#16A34A 0%,#0D9488 100%);border-radius:18px;padding:20px;color:#fff;margin-bottom:12px;position:relative;overflow:hidden}
.walcard::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.walcard::after{content:'';position:absolute;bottom:-40px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.walbig{font-size:34px;font-weight:800;letter-spacing:-.5px;position:relative;z-index:1}
.wallbl{font-size:11px;opacity:.8;margin-bottom:4px;position:relative;z-index:1}
.walrow{display:flex;gap:0;margin-top:16px;position:relative;z-index:1}
.walstat{flex:1;text-align:center}
.walstat:first-child{border-right:1px solid rgba(255,255,255,.2)}
.walstat .wsl{font-size:10px;opacity:.75;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.walstat .wsv{font-size:15px;font-weight:800;margin-top:2px}

/* Income item */
.inc-item{display:flex;align-items:center;gap:10px;background:#fff;border-radius:13px;padding:11px 13px;border:1px solid #EBEBEB;margin-bottom:7px}
.inc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TX item */
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F5F5F5}
.tx-item:last-child{border:none}
.tx-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">F</div>
      <div>
        <div class="logo-title">FinTrack Pro</div>
        <div class="logo-sub">Personal Finance</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span id="hdr-date" style="font-size:11px;color:#9CA3AF;font-weight:500"></span>
      <div style="display:flex;align-items:center;gap:6px">
        <div id="sync-status" style="display:flex;align-items:center;gap:4px;font-size:10px;color:#9CA3AF;font-weight:500">
          <span id="sync-dot" style="width:7px;height:7px;border-radius:50%;background:#9CA3AF;display:inline-block;flex-shrink:0"></span>
          <span id="sync-txt">Not set up</span>
        </div>
        <button onclick="showSettingsMod()" style="background:#F3F4F6;border:none;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:13px;line-height:1" title="Sync Settings">⚙️</button>
      </div>
    </div>
  </div>
  <div class="scroll"><div class="main" id="main"></div></div>
  <div class="bnav">
    <button class="ni on" onclick="go('home')" id="t-home"><span class="ni-ic">⊞</span>Home</button>
    <button class="ni" onclick="go('wallet')" id="t-wallet"><span class="ni-ic">💰</span>Wallet</button>
    <button class="ni" onclick="go('expenses')" id="t-expenses"><span class="ni-ic">💸</span>Expenses</button>
    <button class="ni" onclick="go('loans')" id="t-loans"><span class="ni-ic">🤝</span>Loans</button>
    <button class="ni" onclick="go('budget')" id="t-budget"><span class="ni-ic">◎</span>Budget</button>
    <button class="ni" onclick="go('invest')" id="t-invest"><span class="ni-ic">📈</span>Invest</button>
  </div>
  <button class="fab" id="fab" onclick="openFab()">+</button>
</div>
<div id="modal"></div>
<div id="toast"></div>

<script>
// ══ PWA ═══════════════════════════════════════
function genIcon(sz){
  const c=document.createElement('canvas');c.width=c.height=sz;
  const ctx=c.getContext('2d');const r=sz*.22;
  const g=ctx.createLinearGradient(0,0,sz,sz);
  g.addColorStop(0,'#16A34A');g.addColorStop(1,'#0D9488');
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(sz-r,0);ctx.quadraticCurveTo(sz,0,sz,r);
  ctx.lineTo(sz,sz-r);ctx.quadraticCurveTo(sz,sz,sz-r,sz);
  ctx.lineTo(r,sz);ctx.quadraticCurveTo(0,sz,0,sz-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();
  ctx.fillStyle='#fff';ctx.font=`bold ${sz*.44}px -apple-system,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('F',sz/2,sz/2+sz*.02);return c.toDataURL('image/png');
}
const mf={name:'FinTrack Pro',short_name:'FinTrack',display:'standalone',background_color:'#F5F5F0',theme_color:'#16A34A',orientation:'portrait',start_url:location.href,icons:[{src:genIcon(192),sizes:'192x192',type:'image/png'},{src:genIcon(512),sizes:'512x512',type:'image/png'}]};
const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/manifest+json'}));document.head.appendChild(ml);
const al=document.createElement('link');al.rel='apple-touch-icon';al.href=genIcon(180);document.head.appendChild(al);
if('serviceWorker' in navigator){
  const sw=`const C='ftpro-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('${location.href}')).then(()=>self.skipWaiting())));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))).then(()=>self.clients.claim())));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('${location.href}')))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'})),{scope:'./'});
}

// ══ CONSTANTS ════════════════════════════════
const DEF_CATS=['Food','Transport','Housing','Shopping','Health','Entertainment','Other'];
let CAT_COLORS={Food:'#F59E0B',Transport:'#3B82F6',Housing:'#8B5CF6',Shopping:'#EC4899',Health:'#EF4444',Entertainment:'#06B6D4',Other:'#9CA3AF'};
let CAT_ICONS={Food:'🍽️',Transport:'🚗',Housing:'🏠',Shopping:'🛍️',Health:'💊',Entertainment:'🎬',Other:'📦'};
const INST_CATS=['Mobile','Car','Motorcycle','Laptop','TV','Furniture','Other'];
const INST_ICONS={Mobile:'📱',Car:'🚗',Motorcycle:'🏍️',Laptop:'💻',TV:'📺',Furniture:'🪑',Other:'📦'};
const INST_COL={Mobile:'#3B82F6',Car:'#F59E0B',Motorcycle:'#EF4444',Laptop:'#8B5CF6',TV:'#06B6D4',Furniture:'#D97706',Other:'#9CA3AF'};
const INC_SRCS=['Salary','Business','Freelance','Investment Return','Rent','Gift','Other'];
const INC_ICONS={Salary:'💼',Business:'🏪',Freelance:'💻',['Investment Return']:'📈',Rent:'🏘️',Gift:'🎁',Other:'💵'};
const INC_COLORS={Salary:'#16A34A',Business:'#D97706',Freelance:'#7C3AED',['Investment Return']:'#0D9488',Rent:'#2563EB',Gift:'#EC4899',Other:'#9CA3AF'};

// ══ STATE ═════════════════════════════════════
const NOW=new Date();
const CUR_M=`${NOW.getFullYear()}-${String(NOW.getMonth()+1).padStart(2,'0')}`;
const TODAY=NOW.toISOString().split('T')[0];

let tab='home',lSub='personal',lFlt='all',cFlt='All',budM=CUR_M,editBC=null,walTrFlt='all',instMonthFlt={},selectedInst=null,nid=200;
let expenses=[],pLoans=[],installments=[],investments=[],budgets={},categories=[...DEF_CATS];
let incomes=[],bankInitBalance=0;
let salaries=[],salaryPayments=[],instPayments=[];
let githubToken='',gistId='',lastSynced='';

// ══ SEED ══════════════════════════════════════
const SE=[
  {id:1,date:'2026-04-01',amount:25000,category:'Housing',description:'April Rent'},
  {id:2,date:'2026-04-03',amount:4500,category:'Food',description:'Grocery store'},
  {id:3,date:'2026-04-10',amount:2200,category:'Transport',description:'Fuel & Uber'},
  {id:4,date:TODAY,amount:1800,category:'Food',description:'Dining out'},
  {id:5,date:TODAY,amount:1200,category:'Health',description:'Pharmacy'},
  {id:6,date:'2026-03-05',amount:25000,category:'Housing',description:'March Rent'},
  {id:7,date:'2026-03-12',amount:3500,category:'Shopping',description:'Clothes'},
];
const SL=[
  {id:1,person:'Ahmed',amount:15000,direction:'lent',dueDate:'2026-05-01',paid:false,notes:'Car repair'},
  {id:2,person:'Sara',amount:8000,direction:'borrowed',dueDate:'2026-06-15',paid:false,notes:'Emergency'},
  {id:3,person:'Bilal',amount:5000,direction:'lent',dueDate:'2026-04-20',paid:true,notes:'Books'},
];
const SI=[
  {id:20,itemName:'Samsung Galaxy A55',category:'Mobile',monthlyPayment:8500,totalMonths:12,startDate:'2025-10-01',notes:'Jazz Cash'},
  {id:21,itemName:'Honda CD 70',category:'Motorcycle',monthlyPayment:15000,totalMonths:18,startDate:'2025-06-01',notes:'Bank Alfalah'},
];
const SV=[
  {id:30,businessName:'Ali General Store',ownerName:'Ali Hassan',amountInvested:100000,expectedReturn:120000,returnDate:'2026-12-01',status:'active',notes:'Grocery partnership'},
  {id:31,businessName:'Farhan Textiles',ownerName:'Farhan Ahmed',amountInvested:50000,expectedReturn:60000,returnDate:'2026-09-01',status:'active',notes:'Cloth business'},
];
const SB={Food:10000,Transport:5000,Housing:25000,Shopping:8000,Health:4000,Entertainment:3000,Other:2000};
const SIN=[
  {id:100,date:'2026-04-15',amount:12000,source:'Freelance',notes:'Web project'},
  {id:101,date:TODAY,amount:5000,source:'Business',notes:'Shop income'},
];
const SSAL=[
  {id:150,companyName:'Tech Solutions Pvt.',amount:85000,startMonth:'2026-04',active:true,notes:'Main job'},
  {id:151,companyName:'Freelance Studio',amount:40000,startMonth:'2026-04',active:true,notes:'Part time'},
];
const SPAY=[];

// ══ STORAGE ═══════════════════════════════════
function load(){
  try{
    expenses    =JSON.parse(localStorage.getItem('fp_exp'))||cp(SE);
    pLoans      =JSON.parse(localStorage.getItem('fp_pl'))||cp(SL);
    installments=JSON.parse(localStorage.getItem('fp_inst'))||cp(SI);
    investments =JSON.parse(localStorage.getItem('fp_inv'))||cp(SV);
    budgets     =JSON.parse(localStorage.getItem('fp_bud'))||cp(SB);
    categories  =JSON.parse(localStorage.getItem('fp_cats'))||[...DEF_CATS];
    CAT_ICONS   =JSON.parse(localStorage.getItem('fp_icons'))||CAT_ICONS;
    CAT_COLORS  =JSON.parse(localStorage.getItem('fp_colors'))||CAT_COLORS;
    incomes     =JSON.parse(localStorage.getItem('fp_inc'))||cp(SIN);
    salaries    =JSON.parse(localStorage.getItem('fp_sal'))||cp(SSAL);
    salaryPayments=JSON.parse(localStorage.getItem('fp_spay'))||cp(SPAY);
    instPayments=JSON.parse(localStorage.getItem('fp_ipay'))||[];
    bankInitBalance=parseFloat(localStorage.getItem('fp_bal')||'0');
    nid         =parseInt(localStorage.getItem('fp_nid')||'200');
    githubToken =localStorage.getItem('fp_gh_token')||'';
    gistId      =localStorage.getItem('fp_gh_gist')||'';
    lastSynced  =localStorage.getItem('fp_last_sync')||'';
  }catch(e){
    expenses=cp(SE);pLoans=cp(SL);installments=cp(SI);investments=cp(SV);
    budgets=cp(SB);categories=[...DEF_CATS];incomes=cp(SIN);salaries=cp(SSAL);salaryPayments=cp(SPAY);
  }
}
function save(){
  localStorage.setItem('fp_exp',JSON.stringify(expenses));
  localStorage.setItem('fp_pl',JSON.stringify(pLoans));
  localStorage.setItem('fp_inst',JSON.stringify(installments));
  localStorage.setItem('fp_inv',JSON.stringify(investments));

// ══ HELPERS ═══════════════════════════════════
const fmt=n=>'PKR '+Math.round(n||0).toLocaleString('en-PK');
const h=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function mExp(ym){return expenses.filter(e=>e.date&&e.date.startsWith(ym));}
function mInc(ym){return incomes.filter(i=>i.date&&i.date.startsWith(ym));}
function todayExp(){return expenses.filter(e=>e.date===TODAY);}
function todayInc(){return incomes.filter(i=>i.date===TODAY);}
function byCat(list){const m={};list.forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;});return Object.entries(m).map(([n,v])=>({name:n,value:v})).sort((a,b)=>b.value-a.value);}
function paidM(inst){const s=new Date(inst.startDate);const m=(NOW.getFullYear()-s.getFullYear())*12+(NOW.getMonth()-s.getMonth());return Math.min(Math.max(0,m),inst.totalMonths);}

// Generate all months for an installment
function instMonths(inst){
  const r=[];
  const s=new Date(inst.startDate);
  for(let i=0;i<inst.totalMonths;i++){
    const d=new Date(s.getFullYear(),s.getMonth()+i,1);
    const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    r.push(ym);
  }
  return r;
}
function isInstPaid(instId,month){
  return instPayments.some(p=>p.instId===instId&&p.month===month&&p.paid);
}
function toggleInstMonth(instId,month){
  const existing=instPayments.find(p=>p.instId===instId&&p.month===month);
  if(existing){
    instPayments=instPayments.map(p=>p.instId===instId&&p.month===month?{...p,paid:!p.paid}:p);
  } else {
    instPayments.push({instId,month,paid:true});
    toast('✅ Month marked as paid!');
  }
  save();render();
}
function setInstMF(instId,flt){
  instMonthFlt={...instMonthFlt,[instId]:flt};render();
}
function openInst(id){selectedInst=id;instMonthFlt={...instMonthFlt,[id]:instMonthFlt[id]||'unpaid'};render();}
function backToInst(){selectedInst=null;render();}
function donut(cats,total){
  if(!cats.length||!total)return '#EBEBEB';
  let p=[],d=0;cats.forEach(c=>{const s=c.value/total*360;p.push(`${CAT_COLORS[c.name]||'#9CA3AF'} ${d}deg ${d+s}deg`);d+=s;});
  return `conic-gradient(${p.join(',')})`;
}
function monthOpts(){
  const usedMonths=new Set(expenses.map(e=>e.date?e.date.slice(0,7):'').filter(Boolean));
  const r=[];const d=new Date();
  for(let i=0;i<=11;i++){
    const x=new Date(d.getFullYear(),d.getMonth()+i,1);
    const ym=`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}`;
    r.push({ym,label:x.toLocaleDateString('en-PK',{month:'long',year:'numeric'})});
    usedMonths.delete(ym);
  }
  const pastWithData=[...usedMonths].sort((a,b)=>b.localeCompare(a)).map(ym=>{
    const [y,m]=ym.split('-');
    const x=new Date(parseInt(y),parseInt(m)-1,1);
    return {ym,label:'📂 '+x.toLocaleDateString('en-PK',{month:'long',year:'numeric'})};
  });
  return [...r,...pastWithData];
}
function toast(msg,ms=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}

// Computed bank balance
function calcBalance(){
  const totalIncome=incomes.reduce((s,i)=>s+i.amount,0);
  const totalExp=expenses.reduce((s,e)=>s+e.amount,0);
  return bankInitBalance+totalIncome-totalExp;
}

      <div style="font-weight:700;font-size:13px;margin-bottom:10px">📊 Other Income This Month</div>
      ${srcs.map(([s,v])=>`<div class="trow">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:18px">${INC_ICONS[s]||'💵'}</span>
          <span style="font-weight:600;font-size:13px">${s}</span>
        </div>
        <span style="font-weight:700;color:#16A34A;font-size:13px">+${fmt(v)}</span>
      </div>`).join('')}
    </div>`:'';
  })()}

  <!-- Transaction History -->
  <div style="font-weight:700;font-size:14px;margin-bottom:10px">📋 Transaction History</div>
  <div class="pills">
    <button class="pill ${walTrFlt==='all'?'on':''}" onclick="setWTF('all')">All</button>
    <button class="pill ${walTrFlt==='income'?'ton':''}" onclick="setWTF('income')">💚 Income</button>
    <button class="pill ${walTrFlt==='expense'?'ron':''}" onclick="setWTF('expense')">❤️ Expense</button>
  </div>

  ${sortedDates.length===0?`<div class="emp"><i>📋</i><p>No transactions yet.</p></div>`
    :sortedDates.map(date=>{
      const txs=grouped[date];
      const dayInc=txs.filter(t=>t.txType==='income').reduce((s,t)=>s+t.amount,0);
      const dayExp=txs.filter(t=>t.txType==='expense').reduce((s,t)=>s+t.amount,0);
      const isToday=date===TODAY;
      return `
      <div style="margin-bottom:4px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:12px;font-weight:700;color:#6B7280">${isToday?'📅 Today':date}</div>
          <div style="font-size:11px">
            ${dayInc>0?`<span style="color:#16A34A;font-weight:600">+${fmt(dayInc)}</span>`:''}
            ${dayInc>0&&dayExp>0?` <span style="color:#9CA3AF">·</span> `:''}
            ${dayExp>0?`<span style="color:#DC2626;font-weight:600">-${fmt(dayExp)}</span>`:''}
          </div>
        </div>
        <div class="card" style="padding:8px 12px">
          ${txs.map(t=>`
          <div class="tx-item">
            <div class="tx-ic" style="background:${t.txType==='income'?(INC_COLORS[t.source]||'#9CA3AF')+'18':(CAT_COLORS[t.category]||'#9CA3AF')+'18'}">
              ${t.txType==='income'?(INC_ICONS[t.source]||'💵'):(CAT_ICONS[t.category]||'📦')}
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:13px">${h(t.txType==='income'?t.source:t.description)}</div>
              <div style="font-size:11px;color:#9CA3AF">${h(t.txType==='income'?(t.notes||t.type):(t.category))}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-weight:700;font-size:13px;color:${t.txType==='income'?'#16A34A':'#DC2626'}">${t.txType==='income'?'+':'-'}${fmt(t.amount)}</div>
              ${t.txType==='income'
                ?`<button class="btnd" style="padding:2px 6px;font-size:10px;margin-top:2px" onclick="delIncome(${t.id})">🗑️</button>`
                :`<button class="btnd" style="padding:2px 6px;font-size:10px;margin-top:2px" onclick="delExp(${t.id})">🗑️</button>`}
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}`;
}
function setWTF(f){walTrFlt=f;render();}

// ══ EXPENSES ══════════════════════════════════
function rExp(){
  const sorted=[...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered=cFlt==='All'?sorted:sorted.filter(e=>e.category===cFlt);
  const tm=mExp(CUR_M);
  let budBar='';
  if(cFlt!=='All'&&budgets[cFlt]){
    const s=tm.filter(e=>e.category===cFlt).reduce((a,e)=>a+e.amount,0);
    const p=Math.min(100,Math.round(s/budgets[cFlt]*100));
    const pc=p>90?'#DC2626':p>70?'#F59E0B':'#16A34A';
    budBar=`<div class="card cg" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><b>${cFlt} Budget (This Month)</b><span>${fmt(s)} / ${fmt(budgets[cFlt])}</span></div>
      <div class="bar"><div class="barf" style="width:${p}%;background:${pc}"></div></div>
    </div>`;
  }
  const list=filtered.length===0
    ?`<div class="emp"><i>💸</i><p>No expenses yet. Tap + to add.</p></div>`
    :filtered.map(e=>`<div class="item">
      <div class="ir">
        <div class="ibox" style="background:${CAT_COLORS[e.category]||'#9CA3AF'}18">${CAT_ICONS[e.category]||'📦'}</div>
        <div style="flex:1;min-width:0"><div class="inm">${h(e.description)}</div><div class="imt">${e.category} · ${e.date}</div></div>
        <div style="font-weight:700;font-size:14px;text-align:right;color:#DC2626">-${fmt(e.amount)}</div>
      </div>
      <div class="ar">
        <button class="btne" onclick="showExpMod(${e.id})">✏️ Edit</button>
        <button class="btnd" onclick="delExp(${e.id})">🗑️ Delete</button>
      </div>
    </div>`).join('');
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="stitle" style="margin:0">Expenses</div>
    <button class="btnt" onclick="showExpMod()">+ Add</button>
  </div>
  <div class="pills">
    <button class="pill ${cFlt==='All'?'on':''}" onclick="setCat('All')">All</button>
    ${categories.map(c=>`<button class="pill ${cFlt===c?'on':''}" onclick="setCat('${c}')">${CAT_ICONS[c]||'📦'} ${c}</button>`).join('')}
  </div>
  ${budBar}${list}`;
}
function setCat(f){cFlt=f;render();}

// ══ LOANS ═════════════════════════════════════
function rLoans(){
  const lent=pLoans.filter(l=>l.direction==='lent'&&!l.paid).reduce((s,l)=>s+l.amount,0);
  const borr=pLoans.filter(l=>l.direction==='borrowed'&&!l.paid).reduce((s,l)=>s+l.amount,0);
  const instDebt=installments.reduce((s,i)=>{const unpaid=instMonths(i).filter(m=>!isInstPaid(i.id,m)).length;return s+unpaid*i.monthlyPayment;},0);
  const instMo=installments.reduce((s,i)=>s+i.monthlyPayment,0);
  let content='';

  if(lSub==='personal'){
    const filtered=pLoans.filter(l=>lFlt==='lent'?l.direction==='lent':lFlt==='borrowed'?l.direction==='borrowed':true);
    const cards=filtered.length===0
      ?`<div class="emp"><i>🤝</i><p>No loans here.</p></div>`
      :filtered.map(l=>`<div class="item" style="${l.paid?'opacity:.6':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <span class="inm">${h(l.person)}</span>
            <span class="bdg ${l.direction==='lent'?'bdgg':'bdgr'}">${l.direction==='lent'?'Lent':'Borrowed'}</span>
            ${l.paid?'<span class="bdg bdgy">Settled</span>':''}
            <div class="imt" style="margin-top:4px">${h(l.notes||'—')}${l.dueDate?' · Due '+l.dueDate:''}</div>
          </div>
          <div style="font-weight:800;font-size:14px;color:${l.direction==='lent'?'#16A34A':'#DC2626'}">${fmt(l.amount)}</div>
        </div>
        <div class="ar">
          <button class="btno ${l.paid?'on':''}" onclick="togglePaid(${l.id})">${l.paid?'✓ Settled':'Mark Settled'}</button>
          <button class="btne" onclick="showLoanMod(${l.id})">✏️</button>
          <button class="btnd" onclick="delLoan(${l.id})">🗑️</button>
        </div>
      </div>`).join('');

    content=`
    <div class="g2">
      <div class="card cg" style="margin-bottom:0;cursor:pointer;border:${lFlt==='lent'?'2px solid #16A34A':'1px solid #BBF7D0'}" onclick="setLF('lent')">
        <div class="lbl lg">OWED TO YOU ${lFlt==='lent'?'▼':''}</div>
        <div class="n2" style="color:#15803D">${fmt(lent)}</div>
        <div class="nt" style="color:${lFlt==='lent'?'#16A34A':'#9CA3AF'}">${lFlt==='lent'?'Showing below ↓':'Tap to filter'}</div>
      </div>
      <div class="card cr" style="margin-bottom:0;cursor:pointer;border:${lFlt==='borrowed'?'2px solid #DC2626':'1px solid #FECACA'}" onclick="setLF('borrowed')">
        <div class="lbl lr">YOU OWE ${lFlt==='borrowed'?'▼':''}</div>
        <div class="n2" style="color:#DC2626">${fmt(borr)}</div>
        <div class="nt" style="color:${lFlt==='borrowed'?'#DC2626':'#9CA3AF'}">${lFlt==='borrowed'?'Showing below ↓':'Tap to filter'}</div>
      </div>
    </div>
    <div style="height:8px"></div>
    <div class="pills">
      <button class="pill ${lFlt==='all'?'on':''}" onclick="setLF('all')">All</button>
      <button class="pill ${lFlt==='lent'?'on':''}" onclick="setLF('lent')">💚 Owed to Me</button>
      <button class="pill ${lFlt==='borrowed'?'ron':''}" onclick="setLF('borrowed')">❤️ I Owe</button>
    </div>
    ${cards}`;
  } else {
    // ── Detail view: one installment's months ──
    if(selectedInst!==null){
      const i=installments.find(x=>x.id===selectedInst);
      if(!i){selectedInst=null;}
      else{
        const allMonths=instMonths(i);
        const paidMonths=allMonths.filter(m=>isInstPaid(i.id,m));
        const unpaidMonths=allMonths.filter(m=>!isInstPaid(i.id,m));
        const paidAmt=paidMonths.length*i.monthlyPayment;
        const remAmt=unpaidMonths.length*i.monthlyPayment;
        const total=i.totalMonths*i.monthlyPayment;
        const pct=Math.round(paidMonths.length/i.totalMonths*100);
        const done=unpaidMonths.length===0;
        const flt=instMonthFlt[i.id]||'unpaid';
        const shownMonths=flt==='paid'?paidMonths:flt==='unpaid'?unpaidMonths:allMonths;

        const monthRow=(ym)=>{
          const isPaid=isInstPaid(i.id,ym);
          const [y,m2]=ym.split('-');
          const label=new Date(parseInt(y),parseInt(m2)-1,1).toLocaleDateString('en-PK',{month:'long',year:'numeric'});
          const isCur=ym===CUR_M;
          const isFuture=ym>CUR_M;
          return `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #F5F5F5;background:${isPaid?'#F0FDF4':isFuture?'#FAFAFA':'#fff'}">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:36px;height:36px;border-radius:10px;background:${isPaid?'#DCFCE7':isFuture?'#F3F4F6':'#FEF9C3'};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">
                ${isPaid?'✅':isFuture?'🔒':'⏳'}
              </div>
              <div>
                <div style="font-size:14px;font-weight:600;color:#111">${label}</div>
                <div style="font-size:11px;font-weight:600;margin-top:1px;color:${isPaid?'#16A34A':isFuture?'#9CA3AF':'#D97706'}">
                  ${isPaid?'Paid ✓':isFuture?'Upcoming':'Pending'}
                  ${isCur?'<span style="margin-left:5px;font-size:9px;background:#2563EB;color:#fff;padding:1px 6px;border-radius:99px">Current</span>':''}
                </div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
              <span style="font-weight:800;font-size:14px;color:${isPaid?'#16A34A':'#374151'}">${fmt(i.monthlyPayment)}</span>
              <button onclick="toggleInstMonth(${i.id},'${ym}')" style="padding:7px 12px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:700;min-width:72px;background:${isPaid?'#FEE2E2':'#DCFCE7'};color:${isPaid?'#DC2626':'#16A34A'}">
                ${isPaid?'Undo':'Mark Paid'}
              </button>
            </div>
          </div>`;
        };

        content=`
        <!-- Back button + title -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button onclick="backToInst()" style="background:#F3F4F6;border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:14px;font-weight:600;color:#374151;display:flex;align-items:center;gap:5px">← Back</button>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(i.itemName)}</div>
            <div style="font-size:11px;color:#9CA3AF">${i.category} · ${fmt(i.monthlyPayment)}/mo</div>
          </div>
          <button class="btne" style="padding:6px 10px;font-size:13px;flex-shrink:0" onclick="showInstMod(${i.id})">✏️</button>
        </div>

        <!-- Progress card -->
        <div style="background:linear-gradient(135deg,#1D4ED8,#2563EB);border-radius:16px;padding:16px;margin-bottom:14px;color:#fff">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-bottom:14px">
            <div style="text-align:center;border-right:1px solid rgba(255,255,255,.2)">
              <div style="font-size:9px;opacity:.75;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Paid</div>
              <div style="font-size:22px;font-weight:800;margin-top:2px">${paidMonths.length}</div>
              <div style="font-size:10px;opacity:.75">months</div>
            </div>
            <div style="text-align:center;border-right:1px solid rgba(255,255,255,.2)">
              <div style="font-size:9px;opacity:.75;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Left</div>
              <div style="font-size:22px;font-weight:800;margin-top:2px;color:${done?'#86EFAC':'#FDE68A'}">${unpaidMonths.length}</div>
              <div style="font-size:10px;opacity:.75">months</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:9px;opacity:.75;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Total</div>
              <div style="font-size:22px;font-weight:800;margin-top:2px">${i.totalMonths}</div>
              <div style="font-size:10px;opacity:.75">months</div>
            </div>
          </div>
          <!-- Progress bar -->
          <div style="height:8px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden;margin-bottom:8px">
            <div style="height:100%;width:${pct}%;background:${done?'#4ADE80':'#A3E635'};border-radius:99px;transition:width .5s ease"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;opacity:.8">
            <span>Paid: ${fmt(paidAmt)}</span>
            <span>${pct}% complete</span>
            <span>Left: ${fmt(remAmt)}</span>
          </div>
        </div>

        <!-- Tab switcher -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px">
          <button onclick="setInstMF(${i.id},'unpaid')" style="padding:10px 6px;border-radius:11px;border:2px solid ${flt==='unpaid'?'#F59E0B':'transparent'};cursor:pointer;font-weight:700;font-size:12px;background:${flt==='unpaid'?'#FFFBEB':'#F5F5F0'};color:${flt==='unpaid'?'#D97706':'#6B7280'}">
            ⏳ Unpaid<br><span style="font-size:16px;font-weight:800">${unpaidMonths.length}</span>
          </button>
          <button onclick="setInstMF(${i.id},'paid')" style="padding:10px 6px;border-radius:11px;border:2px solid ${flt==='paid'?'#16A34A':'transparent'};cursor:pointer;font-weight:700;font-size:12px;background:${flt==='paid'?'#F0FDF4':'#F5F5F0'};color:${flt==='paid'?'#16A34A':'#6B7280'}">
            ✅ Paid<br><span style="font-size:16px;font-weight:800">${paidMonths.length}</span>
          </button>
          <button onclick="setInstMF(${i.id},'all')" style="padding:10px 6px;border-radius:11px;border:2px solid ${flt==='all'?'#2563EB':'transparent'};cursor:pointer;font-weight:700;font-size:12px;background:${flt==='all'?'#EFF6FF':'#F5F5F0'};color:${flt==='all'?'#2563EB':'#6B7280'}">
            📋 All<br><span style="font-size:16px;font-weight:800">${i.totalMonths}</span>
          </button>
        </div>

        <!-- Month list -->
        <div style="background:#fff;border-radius:15px;border:1px solid #EBEBEB;overflow:hidden">
          ${shownMonths.length===0
            ?`<div style="text-align:center;padding:32px 20px;color:#9CA3AF">
                <div style="font-size:36px;margin-bottom:10px">${flt==='paid'?'🎯':'🎉'}</div>
                <div style="font-weight:600;font-size:14px">${flt==='paid'?'No paid months yet':'All months paid!'}</div>
                <div style="font-size:12px;margin-top:4px">${flt==='paid'?'Tap "Mark Paid" on unpaid months':'Great job! 🏆'}</div>
              </div>`
            :shownMonths.map(ym=>monthRow(ym)).join('')}
        </div>`;

        return `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="stitle" style="margin:0">Loans & Installments</div>
          <button class="btnt" onclick="showInstMod()">+ Add</button>
        </div>
        <div class="st2">
          <button class="st" onclick="setLS('personal')">🤝 Personal</button>
          <button class="st on">📦 Installments</button>
        </div>
        ${content}`;
      }
    }

    // ── Summary list view ──
    const cards=installments.length===0
      ?`<div class="emp"><i>📦</i><p>No installments yet.<br>Tap + to add one.</p></div>`
      :installments.map(i=>{
        const allMonths=instMonths(i);
        const paidMonths=allMonths.filter(m=>isInstPaid(i.id,m));
        const unpaidMonths=allMonths.filter(m=>!isInstPaid(i.id,m));
        const pct=Math.round(paidMonths.length/i.totalMonths*100);
        const done=unpaidMonths.length===0;
        const nextDue=unpaidMonths.find(m=>m<=CUR_M)||unpaidMonths[0];

        return `
        <div onclick="openInst(${i.id})" style="background:#fff;border-radius:15px;padding:14px;border:1px solid #EBEBEB;margin-bottom:10px;cursor:pointer;active:opacity:.8">
          <div style="display:flex;align-items:center;gap:11px;margin-bottom:12px">
            <div style="width:46px;height:46px;border-radius:13px;background:${INST_COL[i.category]||'#9CA3AF'}18;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${INST_ICONS[i.category]||'📦'}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(i.itemName)}</div>
              <div style="font-size:11px;color:#9CA3AF;margin-top:2px">${i.category}${i.notes?' · '+h(i.notes):''}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              ${done
                ?`<span style="background:#DCFCE7;color:#16A34A;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px">✓ Done</span>`
                :`<span style="background:#EFF6FF;color:#2563EB;font-size:12px;font-weight:800">${fmt(i.monthlyPayment)}<span style="font-size:9px;color:#9CA3AF">/mo</span></span>`}
              <div style="font-size:10px;color:#9CA3AF;margin-top:3px">Tap for details →</div>
            </div>
          </div>

          <!-- Progress bar -->
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#9CA3AF;margin-bottom:5px">
            <span><b style="color:#16A34A">${paidMonths.length}</b> paid</span>
            <span style="font-weight:700;color:${done?'#16A34A':'#374151'}">${pct}%</span>
            <span><b style="color:${done?'#16A34A':'#DC2626'}">${unpaidMonths.length}</b> left</span>
          </div>
          <div style="height:7px;background:#E5E7EB;border-radius:99px;overflow:hidden;margin-bottom:8px">
            <div style="height:100%;width:${pct}%;background:${done?'#16A34A':pct>70?'#F59E0B':'#3B82F6'};border-radius:99px;transition:width .5s ease"></div>
          </div>

          <!-- Bottom row: next due + total -->
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:11px;color:#6B7280">
              ${done?'🎉 Fully paid!'
                :nextDue
                  ?`⏳ Next due: <b style="color:#D97706">${new Date(parseInt(nextDue.split('-')[0]),parseInt(nextDue.split('-')[1])-1,1).toLocaleDateString('en-PK',{month:'short',year:'numeric'})}</b>`
                  :''}
            </div>
            <div style="font-size:11px;color:#9CA3AF">${i.totalMonths} months · ${fmt(i.monthlyPayment*i.totalMonths)}</div>
          </div>
        </div>`;}).join('');

    content=`
    <div class="g2">
      <div class="card cb" style="margin-bottom:0;text-align:center">
        <div class="lbl lb">TOTAL REMAINING</div>
        <div class="n2" style="color:#2563EB">${fmt(instDebt)}</div>
      </div>
      <div class="card" style="margin-bottom:0;text-align:center">
        <div class="lbl">MONTHLY DUES</div>
        <div class="n2">${fmt(instMo)}</div>
      </div>
    </div><div style="height:12px"></div>${cards}`;
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="stitle" style="margin:0">Loans & Installments</div>
    <button class="btnt" onclick="lSub==='personal'?showLoanMod():showInstMod()">+ Add</button>
  </div>
  <div class="st2">
    <button class="st ${lSub==='personal'?'on':''}" onclick="setLS('personal')">🤝 Personal</button>
    <button class="st ${lSub==='installment'?'on':''}" onclick="setLS('installment')">📦 Installments</button>
  </div>
  ${content}`;

// ── Salary Management ──────────────────────────
function salaryMonths(sal){
  // Generate months from salary's startMonth up to current month
  const r=[];
  const [sy,sm]=sal.startMonth.split('-').map(Number);
  const start=new Date(sy,sm-1,1);
  const end=new Date(NOW.getFullYear(),NOW.getMonth(),1);
  let cur=new Date(start);
  while(cur<=end){
    const ym=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
    r.push(ym);
    cur.setMonth(cur.getMonth()+1);
  }
  return r.reverse(); // newest first
}
function isSalPaid(salId,month){
  return salaryPayments.some(p=>p.salaryId===salId&&p.month===month&&p.paid);
}
function toggleSalMonth(salId,month){
  const existing=salaryPayments.find(p=>p.salaryId===salId&&p.month===month);
  if(existing){
    salaryPayments=salaryPayments.map(p=>p.salaryId===salId&&p.month===month?{...p,paid:!p.paid,paidDate:!p.paid?TODAY:''}:p);
    const wasPaid=existing.paid;
    if(!wasPaid){
      // Mark paid → add income entry
      const sal=salaries.find(s=>s.id===salId);
      if(sal){incomes.push({id:nid++,amount:sal.amount,source:'Salary',date:month+'-01',notes:sal.companyName+' salary'});}
    } else {
      // Mark unpaid → remove auto-added income entry for that month
      incomes=incomes.filter(i=>!(i.source==='Salary'&&i.notes===salaries.find(s=>s.id===salId)?.companyName+' salary'&&i.date===month+'-01'));
    }
  } else {
    // First time marking this month
    salaryPayments.push({salaryId:salId,month,paid:true,paidDate:TODAY});
    const sal=salaries.find(s=>s.id===salId);
    if(sal){incomes.push({id:nid++,amount:sal.amount,source:'Salary',date:month+'-01',notes:sal.companyName+' salary'});}
    toast('✅ Salary marked as received!');
  }
  save();render();
}

}

// ══ GITHUB GIST SYNC ══════════════════════════
function setSyncUI(state){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  if(!dot||!txt)return;
  const states={
    idle:   {color:'#9CA3AF',text:'Not set up'},
    ok:     {color:'#16A34A',text:'Synced ✓'},
    syncing:{color:'#F59E0B',text:'Syncing…'},
    offline:{color:'#6B7280',text:'Offline'},
    error:  {color:'#DC2626',text:'Sync error'},
    ready:  {color:'#2563EB',text:'Connected'},
  };
  const s=states[state]||states.idle;
  dot.style.background=s.color;
  txt.textContent=s.text;
}

function buildPayload(){
  return JSON.stringify({
    expenses,pLoans,installments,investments,
    budgets,categories,CAT_ICONS,CAT_COLORS,
    incomes,salaries,salaryPayments,instPayments,bankInitBalance,nid,
    savedAt:new Date().toISOString()
  });
}

async function syncToGist(){
  if(!githubToken||!gistId||!navigator.onLine)return;
  setSyncUI('syncing');
  try{
    const res=await fetch(`https://api.github.com/gists/${gistId}`,{
      method:'PATCH',
      headers:{Authorization:`token ${githubToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'fintrack-data.json':{content:buildPayload()}}})
    });
    if(!res.ok)throw new Error('Failed');
    lastSynced=new Date().toLocaleTimeString();
    localStorage.setItem('fp_last_sync',lastSynced);
    setSyncUI('ok');
  }catch(e){setSyncUI('error');}
}

async function syncFromGist(){
  if(!githubToken||!gistId||!navigator.onLine)return;
  setSyncUI('syncing');
  try{
    const res=await fetch(`https://api.github.com/gists/${gistId}`,{
      headers:{Authorization:`token ${githubToken}`}
    });
    if(!res.ok)throw new Error('Failed');
    const data=await res.json();
    const file=data.files['fintrack-data.json'];
    if(!file)throw new Error('No data file');
    const d=JSON.parse(file.content);
    // Only overwrite if remote data is newer
    const remoteTime=d.savedAt?new Date(d.savedAt):0;
    const localTime=localStorage.getItem('fp_last_sync')?new Date(localStorage.getItem('fp_last_sync_ts')||0):0;
    if(remoteTime>localTime){
      expenses=d.expenses||expenses;
      pLoans=d.pLoans||pLoans;
      installments=d.installments||installments;
      investments=d.investments||investments;
      budgets=d.budgets||budgets;
      categories=d.categories||categories;
      CAT_ICONS=d.CAT_ICONS||CAT_ICONS;
      CAT_COLORS=d.CAT_COLORS||CAT_COLORS;
      incomes=d.incomes||incomes;
      salaries=d.salaries||salaries;
      salaryPayments=d.salaryPayments||salaryPayments;
      instPayments=d.instPayments||instPayments;
      bankInitBalance=d.bankInitBalance||bankInitBalance;
      nid=d.nid||nid;
      // persist to localStorage
      save();
      render();
      toast('☁️ Data synced from GitHub!');
      localStorage.setItem('fp_last_sync_ts',d.savedAt);
    }
    setSyncUI('ok');
  }catch(e){setSyncUI('error');}
}

async function createGist(token){
  const res=await fetch('https://api.github.com/gists',{
    method:'POST',
    headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({
      description:'FinTrack Pro Data Backup',
      public:false,
      files:{'fintrack-data.json':{content:buildPayload()}}
    })
  });
  if(!res.ok)throw new Error('Create failed');
  const data=await res.json();
  return data.id;
}

async function testAndSaveSync(){
  const token=document.getElementById('gh-token').value.trim();
  const gist=document.getElementById('gh-gist').value.trim();
  if(!token){toast('⚠️ Enter your GitHub token');return;}
  const btn=document.getElementById('sync-save-btn');
  btn.textContent='Testing…';btn.disabled=true;
  try{
    // Verify token works
    const r=await fetch('https://api.github.com/user',{headers:{Authorization:`token ${token}`}});
    if(!r.ok)throw new Error('Invalid token');
    const user=await r.json();
    let finalGistId=gist;
    if(!finalGistId){
      // Auto-create a new gist
      finalGistId=await createGist(token);
      toast(`✅ Gist created! ID: ${finalGistId}`);
    }
    // Save credentials
    githubToken=token;gistId=finalGistId;
    localStorage.setItem('fp_gh_token',token);
    localStorage.setItem('fp_gh_gist',finalGistId);
    closeModal();
    setSyncUI('ok');
    toast(`✅ Syncing as ${user.login}!`);
    syncToGist();
  }catch(e){
    btn.textContent='Save & Connect';btn.disabled=false;
    toast('❌ Error: '+e.message);
  }
}

function disconnectSync(){
  if(!confirm('Disconnect GitHub sync? Your local data stays safe.'))return;
  githubToken='';gistId='';lastSynced='';
  localStorage.removeItem('fp_gh_token');
  localStorage.removeItem('fp_gh_gist');
  localStorage.removeItem('fp_last_sync');
  setSyncUI('idle');
  closeModal();
  toast('🔌 Disconnected');
}

// Auto sync when back online
window.addEventListener('online',()=>{setSyncUI(githubToken?'syncing':'idle');syncFromGist();});
window.addEventListener('offline',()=>setSyncUI(githubToken?'offline':'idle'));
